<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ระบบบริหารรายรับ-รายจ่ายคนงาน | Smart Worker Finance</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f0f4f8; padding: 24px 20px; color: #1e293b; }
.container { max-width: 1300px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; margin-bottom: 24px; gap: 12px; }
h2 { font-weight: 700; font-size: 1.8rem; background: linear-gradient(135deg, #1e3c72, #2a5298); -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 10px; }
h2 i { color: #2a5298; }

/* Cards */
.card { background: white; border-radius: 28px; padding: 20px 24px; margin-bottom: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.03); }
.card-title { font-weight: 600; font-size: 1.25rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; border-left: 5px solid #2a5298; padding-left: 14px; color: #0f172a; }

/* Form Grid */
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; align-items: end; }
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-group label { font-size: 0.75rem; font-weight: 600; color: #5b6e8c; }
input, select { padding: 12px 14px; border-radius: 18px; border: 1.5px solid #e2e8f0; font-size: 0.9rem; outline: none; width: 100%; }
input:focus, select:focus { border-color: #2a5298; box-shadow: 0 0 0 3px rgba(42,82,152,0.1); }

/* Buttons */
.btn { padding: 12px 18px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: #1e3c72; color: white; }
.btn-outline { background: white; border: 1.5px solid #cbd5e1; }

/* Type Selector */
.type-selector { background: #f1f5f9; border-radius: 60px; padding: 6px; display: inline-flex; gap: 8px; margin-top: 8px; }
.type-badge { padding: 10px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; color: #64748b; background: transparent; }
.type-badge.active-income { background: #10b981; color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
.type-badge.active-expense { background: #ef4444; color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }

/* Worker Cards */
.workers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; margin-top: 20px; }
.worker-card { background: white; border-radius: 24px; padding: 18px; border: 1px solid #edf2f7; }
.worker-name { font-size: 1.2rem; font-weight: 700; border-bottom: 2px dashed #f1f5f9; padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; }
.stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
.income-stat { color: #10b981; font-weight: 600; }
.expense-stat { color: #ef4444; font-weight: 600; }
.balance { font-weight: 800; font-size: 1.1rem; text-align: right; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
.positive { color: #10b981; } .negative { color: #ef4444; }

@media (max-width: 680px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-users-viewfinder"></i> ระบบรายรับรายจ่ายคนงาน</h2>
        <div style="font-size: 0.8rem; background: #eef2ff; padding: 6px 14px; border-radius: 40px;">
            <i class="fas fa-database"></i> Realtime Sync Active
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-user-plus"></i> เพิ่มคนงานใหม่</div>
        <div class="form-grid">
            <div class="input-group">
                <label>ชื่อคนงาน</label>
                <input id="workerName" placeholder="ระบุชื่อ-นามสกุล">
            </div>
            <button onclick="addWorker()" class="btn btn-primary"><i class="fas fa-plus"></i> เพิ่มคนงาน</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-coins"></i> บันทึกรายการ</div>
        <div class="form-grid">
            <div class="input-group">
                <label>เลือกคนงาน</label>
                <select id="workerSelect">
                    <option value="">-- กำลังโหลดข้อมูล --</option>
                </select>
            </div>
            <div class="input-group">
                <label>จำนวนเงิน (บาท)</label>
                <input id="amount" type="number" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>หมายเหตุ</label>
                <input id="note" placeholder="ระบุรายละเอียด">
            </div>
            <div class="input-group">
                <label>วันที่</label>
                <input id="date" type="datetime-local">
            </div>
        </div>

        <div style="margin-top: 20px;">
            <p style="font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 8px;">ประเภทรายการ</p>
            <div class="type-selector">
                <div id="incomeBtn" class="type-badge" onclick="selectType('income')"><i class="fas fa-arrow-up"></i> ทำงาน (เงินเข้า)</div>
                <div id="expenseBtn" class="type-badge" onclick="selectType('expense')"><i class="fas fa-arrow-down"></i> เบิกเงิน (เงินออก)</div>
            </div>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 10px;">
            <button onclick="addRecord()" class="btn btn-primary" style="flex: 2; background: #2a5298;"><i class="fas fa-save"></i> บันทึกข้อมูล</button>
            <button onclick="resetForm()" class="btn btn-outline" style="flex: 1;"><i class="fas fa-eraser"></i> ล้างฟอร์ม</button>
        </div>
        <div id="statusMsg" style="margin-top: 10px; font-size: 0.8rem; color: #ef4444; font-weight: 600;"></div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-chart-pie"></i> สรุปภาพรวม</div>
        <div style="margin-bottom: 20px;">
            <canvas id="chart" style="max-height: 300px;"></canvas>
        </div>
        <div id="summary"></div>
    </div>
</div>

<script>
// Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyBBf_AXeMoh01UVVn6ToBueaA8jNBfu8RM",
    authDomain: "home-cdb7b.firebaseapp.com",
    databaseURL: "https://home-cdb7b-default-rtdb.firebaseio.com",
    projectId: "home-cdb7b",
    storageBucket: "home-cdb7b.firebasestorage.app",
    messagingSenderId: "292842848697",
    appId: "1:292842848697:web:5143639eccc490b1eef668"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let workers = [];
let selectedType = null;
let chartInstance = null;

// DOM Elements
const workerSelect = document.getElementById('workerSelect');
const amountInput = document.getElementById('amount');
const noteInput = document.getElementById('note');
const dateInput = document.getElementById('date');
const statusMsg = document.getElementById('statusMsg');

// ตั้งค่าวันที่ปัจจุบัน
function setDefaultDate() {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    dateInput.value = now.toISOString().slice(0, 16);
}
setDefaultDate();

// เลือกประเภทรายการ
function selectType(type) {
    selectedType = type;
    document.getElementById('incomeBtn').className = 'type-badge' + (type === 'income' ? ' active-income' : '');
    document.getElementById('expenseBtn').className = 'type-badge' + (type === 'expense' ? ' active-expense' : '');
    statusMsg.innerText = "";
}

// โหลดข้อมูลจาก Firebase
db.ref("workers").on("value", (snapshot) => {
    const data = snapshot.val();
    
    // แปลงข้อมูลจาก Firebase (Object) ให้เป็น Array เสมอ
    if (!data) {
        workers = [];
    } else if (Array.isArray(data)) {
        workers = data.filter(item => item !== null);
    } else {
        workers = Object.values(data);
    }

    // ตรวจสอบโครงสร้าง records ข้างในด้วย
    workers = workers.map(w => ({
        ...w,
        records: w.records ? (Array.isArray(w.records) ? w.records : Object.values(w.records)) : []
    }));

    renderUI();
});

// บันทึกข้อมูลกลับไป Firebase
function syncData() {
    db.ref("workers").set(workers);
}

// เพิ่มคนงาน
function addWorker() {
    const name = document.getElementById('workerName').value.trim();
    if (!name) return alert("กรุณาใส่ชื่อคนงาน");
    
    workers.push({ name: name, records: [] });
    document.getElementById('workerName').value = "";
    syncData();
}

// เพิ่มรายการ รายรับ/รายจ่าย
function addRecord() {
    const idx = workerSelect.value;
    const amount = parseFloat(amountInput.value);
    
    if (idx === "") return alert("กรุณาเลือกคนงาน");
    if (isNaN(amount) || amount <= 0) return alert("กรุณาระบุจำนวนเงิน");
    if (!selectedType) return statusMsg.innerText = "⚠️ โปรดเลือกประเภท (ทำงาน หรือ เบิกเงิน)";

    const record = {
        type: selectedType,
        amount: amount,
        note: noteInput.value || "-",
        date: dateInput.value,
        ts: Date.now()
    };

    workers[idx].records.push(record);
    syncData();
    resetForm();
    alert("บันทึกสำเร็จ!");
}

function resetForm() {
    amountInput.value = "";
    noteInput.value = "";
    selectedType = null;
    document.getElementById('incomeBtn').className = 'type-badge';
    document.getElementById('expenseBtn').className = 'type-badge';
    setDefaultDate();
}

function renderUI() {
    // 1. อัปเดตรายชื่อใน Select
    workerSelect.innerHTML = '<option value="">-- เลือกคนงาน --</option>';
    workers.forEach((w, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerText = w.name;
        workerSelect.appendChild(opt);
    });

    // 2. แสดงการ์ดสรุปและคำนวณเงิน
    let summaryHtml = '<div class="workers-grid">';
    let labels = [];
    let incomeData = [];
    let expenseData = [];

    workers.forEach(w => {
        let totalInc = 0;
        let totalExp = 0;
        w.records.forEach(r => {
            if (r.type === 'income') totalInc += r.amount;
            else totalExp += r.amount;
        });

        const bal = totalInc - totalExp;
        labels.push(w.name);
        incomeData.push(totalInc);
        expenseData.push(totalExp);

        summaryHtml += `
            <div class="worker-card">
                <div class="worker-name">
                    <span>${w.name}</span>
                    <small style="font-size:0.7rem; color:#94a3b8;">${w.records.length} รายการ</small>
                </div>
                <div class="stats">
                    <span>ทำงาน:</span> <span class="income-stat">+${totalInc.toLocaleString()}</span>
                </div>
                <div class="stats">
                    <span>เบิกเงิน:</span> <span class="expense-stat">-${totalExp.toLocaleString()}</span>
                </div>
                <div class="balance ${bal >= 0 ? 'positive' : 'negative'}">
                    คงเหลือ: ${bal.toLocaleString()} ฿
                </div>
            </div>
        `;
    });
    
    document.getElementById('summary').innerHTML = summaryHtml + '</div>';

    // 3. อัปเดตกราฟ
    updateChart(labels, incomeData, expenseData);
}

function updateChart(labels, inc, exp) {
    const ctx = document.getElementById('chart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'ยอดทำงาน', data: inc, backgroundColor: '#10b981', borderRadius: 8 },
                { label: 'ยอดเบิก', data: exp, backgroundColor: '#ef4444', borderRadius: 8 }
            ]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });
}
</script>
</body>
</html>
